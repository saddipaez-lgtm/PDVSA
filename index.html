<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDVSA</title>
</head>
<body>
 
    <div class="pantalla">
        <h1>bienvenidos al sistema de PDVSA</h1>
        <H3>ingrese un numero para validar la filiar donde decea operar</H3>
        <p>ingrese 1 para refineria, ingrese 2 para almacen, ingrese 3 para una estacion de cervisios</p>
        <input type="text" name="" id="t" placeholder="ingrese un numero del 1 al 4">
        <button id="b">validar</button>
    </div>
 
</body>
        <script>
alert("holaaaa");
const boton =document.getElementById("b");
function redirigir(){
    let nucleo =document.getElementById("t").value;
    if(nucleo=== "1"){
        window.location.href = "refineria.html";
    }
    else if(nucleo=== "2"){
        window.location.href="almacen.html";
    }
    else if(nucleo=== "3"){
        window.location.href="bomba.html";
    }
    else if(nucleo === "4"){
        window.location.href="admin.html"
    }
    return;
}
boton.addEventListener("click", function(event){
    event.preventDefault();
    redirigir();
});
        </script>
</html>
